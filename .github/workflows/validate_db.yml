name: Validate Nexus Mod IDs

on:
  workflow_dispatch:   # Triggered externally via cron job (same pattern as update_db.yml)

concurrency:
  group: db-write      # Same group as update_db.yml — prevents simultaneous runs, queues instead
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run validation
        run: python validate_db.py --api-key ${{ secrets.NEXUS_VALIDATOR_KEY }}

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uuid_nexus_db.json validation_cursor.json
          git diff --cached --quiet || git commit -m "Auto: validate mod IDs [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
